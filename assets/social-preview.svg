<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">만월 포트폴리오 공유 이미지</title>
  <desc id="desc">영상 편집자 만월의 포트폴리오 링크 미리보기 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100e06"/>
      <stop offset="0.55" stop-color="#16130a"/>
      <stop offset="1" stop-color="#292414"/>
    </linearGradient>
    <radialGradient id="glow" cx="66%" cy="34%" r="52%">
      <stop offset="0" stop-color="#fde047" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#fde047" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d2a1f" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#1e1c12" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#16130a"/>
  <g transform="translate(0 285)">
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.16">
    <path d="M70 118H520" stroke="#e9e2d2" stroke-width="1"/>
    <path d="M70 512H1120" stroke="#e9e2d2" stroke-width="1"/>
    <path d="M108 72V558" stroke="#e9e2d2" stroke-width="1"/>
    <path d="M1084 72V558" stroke="#e9e2d2" stroke-width="1"/>
  </g>

  <g transform="translate(74 72)">
    <text x="0" y="0" fill="#ffffff" font-family="Arial Unicode MS, Apple SD Gothic Neo, sans-serif" font-size="30" font-weight="800" letter-spacing="-1">STUDIO MANWOL</text>
    <text x="0" y="74" fill="#fde047" font-family="Arial Unicode MS, Apple SD Gothic Neo, sans-serif" font-size="17" font-weight="700" letter-spacing="8">VIDEO EDITORIAL PORTFOLIO</text>
    <text x="0" y="168" fill="#ffffff" font-family="Arial Unicode MS, Apple SD Gothic Neo, sans-serif" font-size="78" font-weight="900" letter-spacing="-5">재미있는 영상을</text>
    <text x="0" y="256" fill="#fde047" font-family="Arial Unicode MS, Apple SD Gothic Neo, sans-serif" font-size="78" font-weight="900" letter-spacing="-5">만들겠습니다.</text>
    <text x="0" y="330" fill="#cec6ad" font-family="Arial Unicode MS, Apple SD Gothic Neo, sans-serif" font-size="25" font-weight="500">브랜드와 콘텐츠의 결을 편집으로 정리합니다.</text>
  </g>

  <g transform="translate(764 118)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="330" rx="34" fill="url(#panel)" stroke="#4b4734" stroke-width="2"/>
    <path d="M92 87C92 69 111 58 127 67L260 145C276 154 276 176 260 185L127 263C111 272 92 261 92 243V87Z" fill="#d9b24a"/>
    <path d="M92 164H260" stroke="#100e06" stroke-width="36"/>
    <rect x="158" y="134" width="36" height="92" fill="#100e06"/>
    <rect x="158" y="106" width="36" height="56" fill="#f5eed6"/>
  </g>

  <g transform="translate(74 540)" font-family="Arial Unicode MS, Apple SD Gothic Neo, sans-serif" font-size="19" font-weight="700" letter-spacing="4">
    <text x="0" y="0" fill="#fde047">PORTFOLIO</text>
    <text x="178" y="0" fill="#cec6ad">EDITING</text>
    <text x="330" y="0" fill="#cec6ad">MOTION</text>
    <text x="485" y="0" fill="#cec6ad">YOUTUBE</text>
